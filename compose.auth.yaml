services:
  mcp:
    environment:
      MCP_OAUTH_ENABLED: "true"
      MCP_SERVER_URL: ${MCP_SERVER_URL:-http://localhost:3000}
      MCP_AUTH_SERVER_URL: ${MCP_AUTH_SERVER_URL:-http://localhost:3001}
      MCP_JWKS_URI: ${MCP_JWKS_URI:-http://auth-server:3001/.well-known/jwks.json}
      MCP_ISSUER: ${MCP_ISSUER:-http://localhost:3001}
      MCP_RESOURCE_NAME: ${MCP_RESOURCE_NAME:-VRM MCP Server}
    depends_on:
      auth-server:
        condition: service_healthy

  auth-server:
    build:
      context: .
      target: dev
    command: pnpm --filter @kajidog/mcp-web-auth dev:auth
    environment:
      PORT: "3001"
      MCP_AUTH_SERVER_URL: ${MCP_AUTH_SERVER_URL:-http://localhost:3001}
      MCP_RESOURCE_NAME: ${MCP_RESOURCE_NAME:-VRM MCP Server}
    ports:
      - "${MCP_AUTH_PORT:-3001}:3001"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3001/.well-known/jwks.json').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

  web-auth:
    build:
      context: .
      target: dev
    command: pnpm --filter @kajidog/mcp-web-auth dev --host 0.0.0.0
    environment:
      VITE_AUTH_MODE: local
      VITE_LOCAL_AUTH_SERVER: ${VITE_LOCAL_AUTH_SERVER:-http://localhost:3001}
    ports:
      - "${WEB_AUTH_PORT:-5173}:5173"
    depends_on:
      auth-server:
        condition: service_healthy
