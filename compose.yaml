services:
  mcp:
    build:
      context: .
      target: runtime
    environment:
      MCP_HTTP_MODE: "true"
      MCP_HTTP_HOST: 0.0.0.0
      MCP_HTTP_PORT: "3000"
      MCP_ALLOWED_HOSTS: ${MCP_ALLOWED_HOSTS:-localhost,127.0.0.1,[::1]}
      MCP_ALLOWED_ORIGINS: ${MCP_ALLOWED_ORIGINS:-http://localhost,http://127.0.0.1,https://localhost,https://127.0.0.1}
      TTS_ENGINE: ${TTS_ENGINE:-voicevox}
      TTS_BASE_URL: ${TTS_BASE_URL:-http://host.docker.internal:50021}
      TTS_API_KEY: ${TTS_API_KEY:-}
      TTS_DEFAULT_SPEAKER: ${TTS_DEFAULT_SPEAKER:-1}
      TTS_PLAYER_CACHE_DIR: /data/cache
      TTS_PLAYER_EXPORT_DIR: /data/exports
    ports:
      - "${MCP_HTTP_PORT:-3000}:3000"
    volumes:
      - vrm-mcp-data:/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

volumes:
  vrm-mcp-data:
