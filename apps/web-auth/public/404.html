<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script>
      ;(function () {
        var base = '/vrm-mcp/'
        var path = window.location.pathname
        var route = path.indexOf(base) === 0 ? path.slice(base.length) : path.replace(/^\/+/, '')
        var query = window.location.search ? '&' + window.location.search.slice(1) : ''
        var hash = window.location.hash || ''
        window.location.replace(base + '?p=/' + route + query + hash)
      })()
    </script>
  </head>
  <body>Redirecting...</body>
</html>
